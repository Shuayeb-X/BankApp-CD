apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: webapps

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: webapps
  name: jenkins-role

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - secrets
    - configmaps
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["autoscaling"]
  resources:
    - horizontalpodautoscalers
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-rolebinding
  namespace: webapps

subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: webapps

roleRef:
  kind: Role
  name: jenkins-role
  apiGroup: rbac.authorization.k8s.io
