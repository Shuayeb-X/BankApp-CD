apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-deployment
  labels:
    app: bankapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bankapp

  template:
    metadata:
      labels:
        app: bankapp

    spec:
      containers:
      - name: bankapp
        image: shauyeb009/bankapp:v1

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: bankapp-service

spec:
  selector:
    app: bankapp

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bankapp-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bankapp-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bankapp-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: bankapp.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: bankapp-service

            port:
              number: 80
